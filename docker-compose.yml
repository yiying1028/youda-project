services:
  mysql:
    image: ${MYSQL_IMAGE:-mysql:8.0}
    container_name: youda-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: youda
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_general_ci
    ports:
      - "3308:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./youda-backend/src/main/resources/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_general_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  youda-backend:
    build:
      context: ./youda-backend
      dockerfile: Dockerfile
      args:
        MAVEN_IMAGE: ${MAVEN_IMAGE:-maven:3.9.9-eclipse-temurin-11}
        JRE_IMAGE: ${JRE_IMAGE:-eclipse-temurin:11-jre-jammy}
    container_name: youda-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/youda?useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_general_ci&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    ports:
      - "18080:8080"
    volumes:
      - ./uploads:/app/uploads

  youda-frontend:
    build:
      context: ./youda-frontend
      dockerfile: Dockerfile
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:22-alpine}
        NGINX_IMAGE: ${NGINX_IMAGE:-nginx:alpine}
    container_name: youda-frontend
    restart: unless-stopped
    depends_on:
      - youda-backend
    ports:
      - "8081:80"

volumes:
  mysql-data:
