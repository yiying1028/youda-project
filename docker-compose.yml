services:
  mysql:
    image: mysql:8.0
    container_name: youda-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: youda
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_general_ci
    ports:
      - "3308:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./youda-backend/src/main/resources/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_general_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  youda-backend:
    build:
      context: ./youda-backend
      dockerfile: Dockerfile
    container_name: youda-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/youda?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    ports:
      - "18080:8080"
    volumes:
      - uploads-data:/app/uploads

  youda-frontend:
    build:
      context: ./youda-frontend
      dockerfile: Dockerfile
    container_name: youda-frontend
    restart: unless-stopped
    depends_on:
      - youda-backend
    ports:
      - "8081:80"

volumes:
  mysql-data:
  uploads-data:
