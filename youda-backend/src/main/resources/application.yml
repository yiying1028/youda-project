server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: youda-backend
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/youda?useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_general_ci&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

mybatis-plus:
  mapper-locations: classpath:/mapper/**/*.xml
  type-aliases-package: com.youda.entity
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

jwt:
  secret: youda-secret-key-for-jwt-token-authentication-2024
  expiration: 604800000

upload:
  path: ./uploads

ai:
  qwen:
    api-key: sk-afb6eff15fb94e5e89eb65fa647b5f5c
    base-url: ${DASHSCOPE_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
    model: ${DASHSCOPE_MODEL:qwen-turbo-latest}
    temperature: ${DASHSCOPE_TEMPERATURE:0.3}
    timeout-ms: ${DASHSCOPE_TIMEOUT_MS:60000}
    max-history-messages: ${DASHSCOPE_MAX_HISTORY_MESSAGES:12}
    system-prompt: ${DASHSCOPE_SYSTEM_PROMPT:你是优答平台的中小学学习辅导助手。请使用简体中文回答，先给结论，再给步骤；语言准确、清晰、适合学生理解。如果题目信息不足，要明确指出缺失信息并引导补充。}
